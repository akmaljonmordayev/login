<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login into Account</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="stars">
        <div class="stars-small"></div>
        <div class="stars-medium"></div>
        <div class="stars-large"></div>
    </div>

    <div class="wrapper">
        <div class="logo">
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="18" stroke="url(#grad)" stroke-width="2"/>
                <path d="M20 10 L23 17 L31 17 L25 22 L27 30 L20 25 L13 30 L15 22 L9 17 L17 17 Z" fill="url(#grad)"/>
                <defs>
                    <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40">
                        <stop offset="0%" stop-color="#a78bfa"/>
                        <stop offset="100%" stop-color="#60a5fa"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <h1>Login into Account</h1>
        <p class="subtitle">Welcome back. Enter your credentials.</p>
        <form action="">
            <div class="input-group">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input class="id-input"  type="number" placeholder="ID Number">
            </div>
            <div class="input-group">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input class="password-input"  type="password" placeholder="Password">
            </div>
            <button type="submit" class="login-btn">
                <span>Login</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>
    </div>


    <script src="./main.js"></script>

</body>
</html>
