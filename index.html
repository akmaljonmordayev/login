<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login into Account</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>

    <div class="wrapper">
        <div class="logo">
            <div class="logo-ring">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="position:relative;z-index:1;">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="url(#logoGrad)" opacity="0.15"/>
                    <path d="M12 6a2 2 0 1 1 0 4 2 2 0 0 1 0-4zm0 5c2.67 0 8 1.34 8 4v1H4v-1c0-2.66 5.33-4 8-4z" fill="url(#logoGrad)"/>
                    <defs>
                        <linearGradient id="logoGrad" x1="0" y1="0" x2="24" y2="24">
                            <stop offset="0%" stop-color="#818cf8"/>
                            <stop offset="100%" stop-color="#f9a8d4"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
        </div>
        <h1>Login into Account</h1>
        <p class="subtitle">Welcome back. Enter your credentials.</p>
        <form action="">
            <div class="input-group">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <input class="id-input"  type="number" placeholder="ID Number">
            </div>
            <div class="input-group">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input class="password-input"  type="password" placeholder="Password">
            </div>
            <button type="submit" class="login-btn">
                <span>Login</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </form>
    </div>


    <script src="./main.js"></script>

</body>
</html>
